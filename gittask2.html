<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #container{
            display: flex;
            flex-direction:column;
            justify-content: center;
            align-items: center;
            background-color: rgb(161, 2, 71);
            height: 100vh;
        }
        button{
            width:115px;
            height:45px;
            border-radius:7px;
            margin:10px;
            cursor: pointer;
        }
        #eat{
            background-color: rgb(201, 13, 44);
            color:white
        }
        #play{
             background-color: rgb(22, 13, 199);
            color:white
        }
        #sleep{
             background-color: rgb(223, 82, 26);
            color:white
        }
        img{
            width:400px;
            height:400px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="container">
        <img id="cat_image" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExeGE5dGE2dmxqdTA3ZHd6djQ1MzdyaDYxdGhwbDI4aG9sZGYxZHF0cCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/ob9Cfk1iUrBUQ/200.webp"/>
        <div>
            <button id="eat" onclick="dogactivity('https://media.tenor.com/7SuOcPZOo1EAAAAM/cat-cat-eating-chips.gif')">Eat</button>
            <button id="play" onclick="dogactivity('https://media.tenor.com/ZneQ-kZ_SHMAAAAM/oscar-cat.gif')">Play</button>
            <button id="sleep" onclick="dogactivity('https://media.tenor.com/kNUwUsb81U4AAAAM/cat-sleep-cat-on-phone.gif')"">Sleep</button>
        </div>
    </div>

  <script>
    function dogactivity(url){
        //getElementById 
        let a=document.getElementById('cat_image')
        a.src=url
    }

   

    
    
    
  </script>
</body>

</html>
